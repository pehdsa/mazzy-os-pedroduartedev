<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Capas de Highlight — Pedro Duarte Dev</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&family=Geist+Mono:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #06060A; font-family: 'Montserrat', sans-serif; }

  .highlight {
    width: 1080px;
    height: 1080px;
    background: radial-gradient(circle at center, var(--tag-color-soft) 0%, transparent 55%),
                #0A0F11;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 36px;
    position: relative;
    overflow: hidden;
  }

  /* Anel decorativo sutil — fica nas bordas, fora do círculo visível */
  .highlight::before {
    content: '';
    position: absolute;
    inset: 60px;
    border-radius: 999px;
    border: 1px solid var(--tag-border);
    opacity: 0.6;
  }

  .highlight .icon-wrap {
    width: 460px;
    height: 460px;
    border-radius: 999px;
    background: var(--tag-color-bg);
    border: 2px solid var(--tag-border);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
    box-shadow: 0 0 80px var(--tag-color-soft);
  }

  .highlight .icon {
    width: 260px;
    height: 260px;
    color: var(--tag-color);
    fill: none;
    stroke: currentColor;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
</style>
</head>
<body>
<div id="slides"></div>
<script src="./tags.js"></script>
<script>
function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

const root = document.getElementById('slides');

for (const tag of window.TAGS) {
  const div = document.createElement('div');
  div.className = 'highlight';
  div.dataset.slug = tag.slug;
  div.style.setProperty('--tag-color', tag.color);
  div.style.setProperty('--tag-color-soft', hexToRgba(tag.color, 0.22));
  div.style.setProperty('--tag-color-bg', hexToRgba(tag.color, 0.10));
  div.style.setProperty('--tag-border', hexToRgba(tag.color, 0.35));

  div.innerHTML = `
    <div class="icon-wrap">
      <svg class="icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">${window.ICONS[tag.icon]}</svg>
    </div>
  `;
  root.appendChild(div);
}
</script>
</body>
</html>

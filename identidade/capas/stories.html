<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Capas de Story — Pedro Duarte Dev</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;900&family=Geist+Mono:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #06060A; font-family: 'Inter', sans-serif; }

  .story {
    width: 1080px;
    height: 1920px;
    background: radial-gradient(ellipse 80% 60% at 50% 25%, var(--tag-color-soft) 0%, transparent 55%),
                radial-gradient(ellipse 60% 40% at 30% 85%, rgba(139,92,246,0.10) 0%, transparent 60%),
                #0A0F11;
    display: flex;
    flex-direction: column;
    padding: 180px 80px 220px;
    color: #FFFFFF;
    position: relative;
    overflow: hidden;
  }

  /* Anel decorativo sutil no fundo */
  .story::before {
    content: '';
    position: absolute;
    width: 1400px;
    height: 1400px;
    border-radius: 999px;
    border: 1px solid var(--tag-border);
    opacity: 0.25;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
  }

  .story-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
    z-index: 1;
  }
  .story-handle {
    font-family: 'Geist Mono', monospace;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 1.5px;
    color: #A1A1AA;
  }
  .story-badge {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 10px 20px;
    border-radius: 999px;
    background: var(--tag-color-bg);
    border: 1px solid var(--tag-border);
    font-family: 'Geist Mono', monospace;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 2px;
    color: var(--tag-color);
    text-transform: uppercase;
  }
  .story-badge svg {
    width: 18px;
    height: 18px;
    fill: none;
    stroke: currentColor;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .story-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 48px;
    text-align: center;
    position: relative;
    z-index: 1;
  }

  .story-icon-wrap {
    width: 360px;
    height: 360px;
    border-radius: 999px;
    background: var(--tag-color-bg);
    border: 2px solid var(--tag-border);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 30px 80px var(--tag-color-soft);
  }
  .story-icon {
    width: 200px;
    height: 200px;
    color: var(--tag-color);
    fill: none;
    stroke: currentColor;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .story-name {
    font-family: 'Montserrat', sans-serif;
    font-size: 160px;
    font-weight: 900;
    letter-spacing: -5px;
    line-height: 0.95;
    color: #FFFFFF;
  }

  .story-divider {
    width: 100px;
    height: 4px;
    background: var(--tag-color);
    border-radius: 2px;
  }

  .story-desc {
    font-size: 30px;
    font-weight: 500;
    line-height: 1.4;
    color: #A1A1AA;
    max-width: 800px;
  }

  .story-footer {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    position: relative;
    z-index: 1;
  }
  .story-foot-text {
    font-family: 'Inter', sans-serif;
    font-size: 22px;
    font-weight: 500;
    color: #71717A;
    letter-spacing: 0.3px;
  }
  .story-foot-dot {
    width: 8px;
    height: 8px;
    border-radius: 999px;
    background: var(--tag-color);
  }
</style>
</head>
<body>
<div id="slides"></div>
<script src="./tags.js"></script>
<script>
function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

const root = document.getElementById('slides');

for (const tag of window.TAGS) {
  const div = document.createElement('div');
  div.className = 'story';
  div.dataset.slug = tag.slug;
  div.style.setProperty('--tag-color', tag.color);
  div.style.setProperty('--tag-color-soft', hexToRgba(tag.color, 0.18));
  div.style.setProperty('--tag-color-bg', hexToRgba(tag.color, 0.10));
  div.style.setProperty('--tag-border', hexToRgba(tag.color, 0.40));

  div.innerHTML = `
    <div class="story-header">
      <div class="story-handle">@pedroduarte.dev</div>
      <div class="story-badge">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">${window.ICONS[tag.icon]}</svg>
        ${tag.name}
      </div>
    </div>

    <div class="story-body">
      <div class="story-icon-wrap">
        <svg class="story-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">${window.ICONS[tag.icon]}</svg>
      </div>
      <div class="story-name">${tag.name}</div>
      <div class="story-divider"></div>
      <div class="story-desc">${tag.desc}</div>
    </div>

    <div class="story-footer">
      <div class="story-foot-dot"></div>
      <div class="story-foot-text">Conteúdo toda semana</div>
      <div class="story-foot-dot"></div>
    </div>
  `;
  root.appendChild(div);
}
</script>
</body>
</html>

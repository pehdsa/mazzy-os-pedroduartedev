<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Story — Arquitetura é trade-off</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800;900&family=Geist+Mono:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #06060A; font-family: 'Inter', sans-serif; }

  .story {
    width: 1080px;
    height: 1920px;
    background: radial-gradient(ellipse 80% 60% at 50% 18%, rgba(139,92,246,0.24) 0%, transparent 55%),
                radial-gradient(ellipse 60% 40% at 30% 90%, rgba(236,72,153,0.10) 0%, transparent 60%),
                #0A0F11;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 170px 80px 200px;
    color: #FFFFFF;
    position: relative;
    overflow: hidden;
  }

  .story::before {
    content: '';
    position: absolute;
    width: 1400px;
    height: 1400px;
    border-radius: 999px;
    border: 1px solid rgba(139,92,246,0.18);
    opacity: 0.55;
    top: -350px;
    left: 50%;
    transform: translateX(-50%);
  }

  .head {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 18px;
    position: relative;
    z-index: 1;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 12px 24px;
    border-radius: 999px;
    background: rgba(139, 92, 246, 0.14);
    border: 1px solid rgba(139, 92, 246, 0.45);
    font-family: 'Geist Mono', monospace;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 2.5px;
    color: #C4B5FD;
    text-transform: uppercase;
  }
  .badge svg { width: 22px; height: 22px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .handle {
    font-family: 'Geist Mono', monospace;
    font-size: 22px; font-weight: 600; letter-spacing: 1.5px; color: #A1A1AA;
  }

  .eyebrow {
    margin-top: 70px;
    font-family: 'Geist Mono', monospace;
    font-size: 26px; font-weight: 700; letter-spacing: 4px;
    color: #C4B5FD; text-transform: uppercase;
    text-align: center; position: relative; z-index: 1;
  }
  .title {
    margin-top: 22px;
    font-family: 'Montserrat', sans-serif;
    font-size: 104px; font-weight: 900; line-height: 1;
    letter-spacing: -3.5px;
    color: #FFFFFF; text-align: center;
    max-width: 920px; position: relative; z-index: 1;
  }
  .title em { color: #C4B5FD; font-style: normal; }

  /* Cards de perguntas */
  .cards {
    margin-top: 60px;
    display: flex; flex-direction: column; gap: 16px;
    width: 100%; max-width: 880px;
    position: relative; z-index: 1;
  }
  .card {
    display: flex; align-items: center; gap: 22px;
    padding: 24px 28px; border-radius: 16px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.10);
  }
  .card.ok {
    background: rgba(139, 92, 246, 0.10);
    border: 1px solid rgba(139, 92, 246, 0.42);
  }
  .icon-box {
    flex-shrink: 0;
    width: 56px; height: 56px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Geist Mono', monospace;
    font-size: 26px; font-weight: 800;
  }
  .icon-box.err {
    background: rgba(239, 68, 68, 0.13);
    border: 1px solid rgba(239, 68, 68, 0.38);
    color: #F87171;
  }
  .icon-box.ok {
    background: rgba(139, 92, 246, 0.18);
    border: 1px solid rgba(139, 92, 246, 0.45);
    color: #C4B5FD;
  }
  .card-text {
    font-family: 'Montserrat', sans-serif;
    font-size: 28px; font-weight: 600; line-height: 1.2;
    color: #FAFAFA;
  }
  .card.ok .card-text { color: #FAFAFA; font-weight: 700; }

  .transition {
    margin-top: 32px;
    text-align: center;
    font-family: 'Montserrat', sans-serif;
    font-size: 26px; font-weight: 600; line-height: 1.3;
    color: #A1A1AA; max-width: 800px;
    position: relative; z-index: 1;
  }
  .transition em { color: #C4B5FD; font-style: normal; }

  .hint {
    margin-top: auto;
    display: inline-flex; align-items: center; gap: 10px;
    font-family: 'Geist Mono', monospace;
    font-size: 20px; font-weight: 500; letter-spacing: 1.5px;
    color: #6B7280; text-transform: uppercase;
    position: relative; z-index: 1;
  }
  .hint-dot {
    width: 6px; height: 6px; border-radius: 999px;
    background: #8B5CF6;
  }
</style>
</head>
<body>

<div class="story">
  <div class="head">
    <div class="badge">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12.83 2.18a2 2 0 0 0-1.66 0L2.6 6.08a1 1 0 0 0 0 1.83l8.58 3.91a2 2 0 0 0 1.66 0l8.58-3.9a1 1 0 0 0 0-1.83Z"/>
        <path d="m22 17.65-9.17 4.16a2 2 0 0 1-1.66 0L2 17.65"/>
        <path d="m22 12.65-9.17 4.16a2 2 0 0 1-1.66 0L2 12.65"/>
      </svg>
      Architecture
    </div>
    <div class="handle">@pedroduarte.dev</div>
  </div>

  <div class="eyebrow">Novo no feed</div>
  <div class="title">Arquitetura é<br><em>trade-off</em></div>

  <div class="cards">
    <div class="card">
      <div class="icon-box err">✕</div>
      <div class="card-text">Qual o melhor banco?</div>
    </div>
    <div class="card">
      <div class="icon-box err">✕</div>
      <div class="card-text">Qual o melhor framework?</div>
    </div>
    <div class="card">
      <div class="icon-box err">✕</div>
      <div class="card-text">Qual a melhor arquitetura?</div>
    </div>
  </div>

  <div class="transition">Não existe melhor universal.<br>Existe o melhor <em>pro contexto</em>.</div>

  <div class="cards" style="margin-top: 28px;">
    <div class="card ok">
      <div class="icon-box ok">✓</div>
      <div class="card-text">O que precisamos otimizar agora?</div>
    </div>
  </div>

  <div class="hint">
    <span class="hint-dot"></span>
    Carrossel completo no feed
    <span class="hint-dot"></span>
  </div>
</div>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Story — Novo no feed: 5 ideias de Clean Code</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800;900&family=Geist+Mono:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { background: #06060A; font-family: 'Inter', sans-serif; }

  .story {
    width: 1080px;
    height: 1920px;
    background: radial-gradient(ellipse 80% 60% at 50% 20%, rgba(6,182,212,0.20) 0%, transparent 55%),
                radial-gradient(ellipse 60% 40% at 30% 90%, rgba(139,92,246,0.10) 0%, transparent 60%),
                #0A0F11;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 200px 80px 240px;
    color: #FFFFFF;
    position: relative;
    overflow: hidden;
  }

  .story::before {
    content: '';
    position: absolute;
    width: 1400px;
    height: 1400px;
    border-radius: 999px;
    border: 1px solid rgba(6,182,212,0.18);
    opacity: 0.5;
    top: -300px;
    left: 50%;
    transform: translateX(-50%);
  }

  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
    z-index: 1;
  }
  .handle {
    font-family: 'Geist Mono', monospace;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 1.5px;
    color: #A1A1AA;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 12px 22px;
    border-radius: 999px;
    background: rgba(6, 182, 212, 0.10);
    border: 1px solid rgba(6, 182, 212, 0.40);
    font-family: 'Geist Mono', monospace;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 2px;
    color: #06B6D4;
    text-transform: uppercase;
  }
  .badge svg {
    width: 20px;
    height: 20px;
    fill: none;
    stroke: currentColor;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .eyebrow {
    margin-top: 80px;
    font-family: 'Geist Mono', monospace;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 4px;
    color: #06B6D4;
    text-transform: uppercase;
    text-align: center;
    position: relative;
    z-index: 1;
  }

  .subtitle {
    margin-top: 24px;
    font-family: 'Montserrat', sans-serif;
    font-size: 48px;
    font-weight: 700;
    line-height: 1.15;
    letter-spacing: -1.5px;
    color: #FFFFFF;
    text-align: center;
    max-width: 820px;
    position: relative;
    z-index: 1;
  }
  .subtitle em {
    color: #06B6D4;
    font-style: normal;
  }

  .preview {
    margin-top: 70px;
    width: 720px;
    aspect-ratio: 4 / 5;
    border-radius: 24px;
    overflow: hidden;
    border: 2px solid rgba(6, 182, 212, 0.35);
    box-shadow: 0 40px 100px rgba(6, 182, 212, 0.22),
                0 0 0 8px rgba(6, 182, 212, 0.04);
    background-image: url('./instagram/slide-01.png');
    background-size: cover;
    background-position: center;
    position: relative;
    z-index: 1;
  }

  .cta {
    margin-top: auto;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    padding: 22px 36px;
    border-radius: 999px;
    background: #06B6D4;
    color: #06060A;
    font-family: 'Montserrat', sans-serif;
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
    position: relative;
    z-index: 1;
  }
  .cta svg {
    width: 22px;
    height: 22px;
    fill: none;
    stroke: currentColor;
    stroke-width: 3;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
</style>
</head>
<body>

<div class="story">
  <div class="header">
    <div class="handle">@pedroduarte.dev</div>
    <div class="badge">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/>
        <path d="M9 18h6"/>
        <path d="M10 22h4"/>
      </svg>
      Concepts
    </div>
  </div>

  <div class="eyebrow">Novo no feed</div>
  <div class="subtitle">5 ideias de <em>Clean Code</em><br>com exemplo de código.</div>

  <div class="preview"></div>

  <div class="cta">
    Ver no perfil
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M5 12h14"/>
      <path d="M12 5l7 7-7 7"/>
    </svg>
  </div>
</div>

</body>
</html>
